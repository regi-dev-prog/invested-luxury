name: Verify Mytheresa Apply

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run verification
        env:
          SANITY_TOKEN: ${{ secrets.SANITY_TOKEN }}
        run: |
          cd scripts/cj-mytheresa
          python3 verify_apply.py 2>&1 | tee verify_output.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: verify-output
          path: scripts/cj-mytheresa/verify_output.txt

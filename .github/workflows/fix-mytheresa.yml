name: Fix Mytheresa URLs

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Operation mode"
        required: true
        default: "search-only"
        type: choice
        options:
          - search-only          # safest: report only, no Sanity writes
          - dry-run-approved     # simulate apply on all HIGH-confidence
          - apply-approved       # write all HIGH-confidence to Sanity
          - dry-run-curated      # simulate apply on curated whitelist only (16)
          - apply-curated        # write curated whitelist (16) to Sanity
      limit:
        description: "Process first N entries (blank = all)"
        required: false
        default: ""

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Determine flags
        id: flags
        run: |
          MODE="${{ github.event.inputs.mode }}"
          case "$MODE" in
            search-only)
              echo "EXTRA=--search-only" >> $GITHUB_OUTPUT
              echo "CURATED=" >> $GITHUB_OUTPUT
              ;;
            dry-run-approved)
              echo "EXTRA=" >> $GITHUB_OUTPUT
              echo "CURATED=" >> $GITHUB_OUTPUT
              ;;
            apply-approved)
              echo "EXTRA=--apply-approved" >> $GITHUB_OUTPUT
              echo "CURATED=" >> $GITHUB_OUTPUT
              ;;
            dry-run-curated)
              echo "EXTRA=" >> $GITHUB_OUTPUT
              echo "CURATED=--curated-file=curated_approved.txt" >> $GITHUB_OUTPUT
              ;;
            apply-curated)
              echo "EXTRA=--apply-approved" >> $GITHUB_OUTPUT
              echo "CURATED=--curated-file=curated_approved.txt" >> $GITHUB_OUTPUT
              ;;
          esac
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            echo "LIMIT=--limit=${{ github.event.inputs.limit }}" >> $GITHUB_OUTPUT
          else
            echo "LIMIT=" >> $GITHUB_OUTPUT
          fi

      - name: Run fix_mytheresa.py
        env:
          SANITY_TOKEN: ${{ secrets.SANITY_TOKEN }}
          CJ_PAT: ${{ secrets.CJ_PAT }}
        run: |
          cd scripts/cj-mytheresa
          python3 fix_mytheresa.py \
            --output-dir=../../reports \
            ${{ steps.flags.outputs.LIMIT }} \
            ${{ steps.flags.outputs.CURATED }} \
            ${{ steps.flags.outputs.EXTRA }}

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mytheresa-fix-report-${{ github.run_id }}
          path: reports/
          retention-days: 30

      - name: Print summary
        if: always()
        run: |
          if [ -f reports/REPORT.md ]; then
            cat reports/REPORT.md >> $GITHUB_STEP_SUMMARY
          fi

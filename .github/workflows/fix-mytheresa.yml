name: Fix Mytheresa URLs

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Operation mode"
        required: true
        default: "search-only"
        type: choice
        options:
          - search-only   # report only, no Sanity writes (safest)
          - dry-run       # simulate mutations
          - apply         # write to Sanity
      limit:
        description: "Process only first N entries (blank = all)"
        required: false
        default: ""

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Determine flags
        id: flags
        run: |
          case "${{ github.event.inputs.mode }}" in
            search-only)
              echo "EXTRA=--search-only" >> $GITHUB_OUTPUT ;;
            dry-run)
              echo "EXTRA=" >> $GITHUB_OUTPUT ;;
            apply)
              echo "EXTRA=--apply" >> $GITHUB_OUTPUT ;;
          esac
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            echo "LIMIT=--limit=${{ github.event.inputs.limit }}" >> $GITHUB_OUTPUT
          else
            echo "LIMIT=" >> $GITHUB_OUTPUT
          fi

      - name: Run fix_mytheresa.py
        env:
          SANITY_TOKEN: ${{ secrets.SANITY_TOKEN }}
          CJ_PAT: ${{ secrets.CJ_PAT }}
        run: |
          cd scripts/cj-mytheresa
          python3 fix_mytheresa.py \
            --output-dir=../../reports \
            ${{ steps.flags.outputs.LIMIT }} \
            ${{ steps.flags.outputs.EXTRA }}

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mytheresa-fix-report-${{ github.run_id }}
          path: reports/
          retention-days: 30

      - name: Print report summary
        if: always()
        run: |
          if [ -f reports/REPORT.md ]; then
            cat reports/REPORT.md >> $GITHUB_STEP_SUMMARY
          else
            echo "No report generated" >> $GITHUB_STEP_SUMMARY
          fi

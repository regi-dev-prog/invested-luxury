name: Diagnose Page Cache

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run diagnostic
        run: |
          cd scripts/cj-mytheresa
          python3 diagnose_page.py 2>&1 | tee diagnose_output.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: diagnose-output
          path: scripts/cj-mytheresa/diagnose_output.txt

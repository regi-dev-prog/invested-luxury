name: Inspect Affiliate Shape

on:
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - env:
          SANITY_TOKEN: ${{ secrets.SANITY_TOKEN }}
        run: |
          cd scripts/cj-mytheresa
          python3 inspect_affiliate_shape.py 2>&1 | tee inspect_output.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: inspect-affiliate-${{ github.run_id }}
          path: scripts/cj-mytheresa/inspect_output.txt
